<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg1" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d1a;stop-opacity:1" />
    </radialGradient>

    <!-- Bronze glow -->
    <filter id="bronzeGlow1">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Hexagon mask -->
    <defs>
      <polygon id="hexagon1" points="256,50 406,138.5 406,373.5 256,462 106,373.5 106,138.5"/>
    </defs>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg1)"/>

  <!-- Hexagon outer frame (bronze) -->
  <polygon points="256,50 406,138.5 406,373.5 256,462 106,373.5 106,138.5"
           fill="none" stroke="#CD7F32" stroke-width="3" filter="url(#bronzeGlow1)"/>

  <!-- Inner hexagon frame -->
  <polygon points="256,65 395,147.5 395,364.5 256,447 117,364.5 117,147.5"
           fill="none" stroke="#8B6F47" stroke-width="1" opacity="0.5"/>

  <!-- Hexagon background fill (subtle) -->
  <polygon points="256,65 395,147.5 395,364.5 256,447 117,364.5 117,147.5"
           fill="#0a0a15" opacity="0.7"/>

  <!-- Sprout/Seedling icon -->
  <g transform="translate(256, 200)">
    <!-- Soil -->
    <ellipse cx="0" cy="45" rx="35" ry="15" fill="#8B4513" opacity="0.8"/>

    <!-- Left leaf -->
    <path d="M -8 30 Q -25 15 -28 0 Q -20 5 -15 20 Z" fill="#22C55E" opacity="0.9"/>

    <!-- Right leaf -->
    <path d="M 8 30 Q 25 15 28 0 Q 20 5 15 20 Z" fill="#16A34A" opacity="0.9"/>

    <!-- Center sprout -->
    <path d="M 0 45 Q -3 20 0 0 Q 3 20 0 45" fill="#22C55E" opacity="1"/>

    <!-- Top leaf accent -->
    <path d="M 0 0 Q -8 -8 -12 -15 Q -5 -8 0 -5 Z" fill="#4ADE80" opacity="0.8"/>
    <path d="M 0 0 Q 8 -8 12 -15 Q 5 -8 0 -5 Z" fill="#4ADE80" opacity="0.8"/>
  </g>

  <!-- Bronze tier indicator -->
  <circle cx="256" cy="480" r="18" fill="#CD7F32" filter="url(#bronzeGlow1)"/>
  <text x="256" y="487" font-size="16" font-weight="bold" text-anchor="middle" fill="#fff">B</text>

  <!-- Badge name -->
  <text x="256" y="425" font-size="18" font-weight="bold" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif">Base Newbie</text>

  <!-- Base Quest text -->
  <text x="256" y="510" font-size="11" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" letter-spacing="1">BASE QUEST</text>
</svg>