<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg2" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d1a;stop-opacity:1" />
    </radialGradient>

    <!-- Silver glow -->
    <filter id="silverGlow2">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg2)"/>

  <!-- Hexagon outer frame (silver) -->
  <polygon points="256,50 406,138.5 406,373.5 256,462 106,373.5 106,138.5"
           fill="none" stroke="#C0C0C0" stroke-width="3" filter="url(#silverGlow2)"/>

  <!-- Inner hexagon frame -->
  <polygon points="256,65 395,147.5 395,364.5 256,447 117,364.5 117,147.5"
           fill="none" stroke="#808080" stroke-width="1" opacity="0.5"/>

  <!-- Hexagon background fill -->
  <polygon points="256,65 395,147.5 395,364.5 256,447 117,364.5 117,147.5"
           fill="#0a0a15" opacity="0.7"/>

  <!-- Book/Scroll icon -->
  <g transform="translate(256, 200)">
    <!-- Left book page -->
    <rect x="-28" y="-20" width="22" height="50" fill="#0052FF" opacity="0.9" rx="2"/>
    <line x1="-26" y1="-15" x2="-8" y2="-15" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
    <line x1="-26" y1="-8" x2="-8" y2="-8" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
    <line x1="-26" y1="-1" x2="-8" y2="-1" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
    <line x1="-26" y1="6" x2="-8" y2="6" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
    <line x1="-26" y1="13" x2="-8" y2="13" stroke="#fff" stroke-width="1.5" opacity="0.6"/>

    <!-- Right book page -->
    <rect x="6" y="-20" width="22" height="50" fill="#0052FF" opacity="0.7" rx="2"/>
    <line x1="8" y1="-15" x2="26" y2="-15" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
    <line x1="8" y1="-8" x2="26" y2="-8" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
    <line x1="8" y1="-1" x2="26" y2="-1" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
    <line x1="8" y1="6" x2="26" y2="6" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
    <line x1="8" y1="13" x2="26" y2="13" stroke="#fff" stroke-width="1.5" opacity="0.5"/>

    <!-- Spine -->
    <rect x="-6" y="-20" width="12" height="50" fill="#003399" opacity="0.8" rx="1"/>

    <!-- Scroll accent -->
    <path d="M -40 35 Q -45 35 -45 40 L -45 45 Q -45 50 -40 50 L 40 50 Q 45 50 45 45 L 45 40 Q 45 35 40 35"
          fill="none" stroke="#0052FF" stroke-width="2" opacity="0.7"/>
  </g>

  <!-- Silver tier indicator -->
  <circle cx="256" cy="480" r="18" fill="#C0C0C0" filter="url(#silverGlow2)"/>
  <text x="256" y="487" font-size="16" font-weight="bold" text-anchor="middle" fill="#000">S</text>

  <!-- Badge name -->
  <text x="256" y="425" font-size="18" font-weight="bold" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif">Knowledge Seeker</text>

  <!-- Base Quest text -->
  <text x="256" y="510" font-size="11" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" letter-spacing="1">BASE QUEST</text>
</svg>