<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg5" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d1a;stop-opacity:1" />
    </radialGradient>

    <!-- Orange/Red glow -->
    <filter id="flameGlow5">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Flame gradient -->
    <linearGradient id="flameGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#FF1744;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF5722;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFCA28;stop-opacity:0.8" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg5)"/>

  <!-- Hexagon outer frame (platinum - bright) -->
  <polygon points="256,50 406,138.5 406,373.5 256,462 106,373.5 106,138.5"
           fill="none" stroke="#E8E8E8" stroke-width="3" filter="url(#flameGlow5)"/>

  <!-- Inner hexagon frame -->
  <polygon points="256,65 395,147.5 395,364.5 256,447 117,364.5 117,147.5"
           fill="none" stroke="#B8B8B8" stroke-width="1" opacity="0.5"/>

  <!-- Hexagon background fill -->
  <polygon points="256,65 395,147.5 395,364.5 256,447 117,364.5 117,147.5"
           fill="#0a0a15" opacity="0.7"/>

  <!-- Flame icon -->
  <g transform="translate(256, 210)">
    <!-- Outer flame shape -->
    <path d="M 0 -30 Q -15 -10 -12 10 Q -8 25 0 35 Q 8 25 12 10 Q 15 -10 0 -30 Z"
          fill="url(#flameGrad)" opacity="0.95" filter="url(#flameGlow5)"/>

    <!-- Inner flame (yellow) -->
    <path d="M 0 -20 Q -10 -5 -8 8 Q -5 18 0 24 Q 5 18 8 8 Q 10 -5 0 -20 Z"
          fill="#FFEA00" opacity="0.8"/>

    <!-- Core (bright yellow) -->
    <path d="M 0 -10 Q -6 0 -5 8 Q -3 12 0 15 Q 3 12 5 8 Q 6 0 0 -10 Z"
          fill="#FFF44F" opacity="0.7"/>

    <!-- Spark 1 (left) -->
    <circle cx="-18" cy="-5" r="3" fill="#FFCA28" opacity="0.8"/>
    <line x1="-18" y1="-5" x2="-25" y2="-10" stroke="#FFCA28" stroke-width="1.5" opacity="0.6"/>

    <!-- Spark 2 (right) -->
    <circle cx="18" cy="-5" r="3" fill="#FFCA28" opacity="0.8"/>
    <line x1="18" y1="-5" x2="25" y2="-10" stroke="#FFCA28" stroke-width="1.5" opacity="0.6"/>

    <!-- Spark 3 (top) -->
    <circle cx="0" cy="-35" r="2.5" fill="#FFF44F" opacity="0.9"/>
  </g>

  <!-- Platinum tier indicator -->
  <circle cx="256" cy="480" r="18" fill="#E8E8E8" filter="url(#flameGlow5)"/>
  <text x="256" y="487" font-size="14" font-weight="bold" text-anchor="middle" fill="#000">★</text>

  <!-- Badge name -->
  <text x="256" y="425" font-size="18" font-weight="bold" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif">Streak King</text>

  <!-- Base Quest text -->
  <text x="256" y="510" font-size="11" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" letter-spacing="1">BASE QUEST</text>
</svg>