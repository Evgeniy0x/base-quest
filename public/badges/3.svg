<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg3" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d1a;stop-opacity:1" />
    </radialGradient>

    <!-- Gold glow -->
    <filter id="goldGlow3">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg3)"/>

  <!-- Hexagon outer frame (gold) -->
  <polygon points="256,50 406,138.5 406,373.5 256,462 106,373.5 106,138.5"
           fill="none" stroke="#FFD700" stroke-width="3" filter="url(#goldGlow3)"/>

  <!-- Inner hexagon frame -->
  <polygon points="256,65 395,147.5 395,364.5 256,447 117,364.5 117,147.5"
           fill="none" stroke="#DAA520" stroke-width="1" opacity="0.5"/>

  <!-- Hexagon background fill -->
  <polygon points="256,65 395,147.5 395,364.5 256,447 117,364.5 117,147.5"
           fill="#0a0a15" opacity="0.7"/>

  <!-- Compass icon -->
  <g transform="translate(256, 200)">
    <!-- Outer compass circle -->
    <circle cx="0" cy="0" r="42" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.8"/>
    <circle cx="0" cy="0" r="38" fill="none" stroke="#DAA520" stroke-width="1" opacity="0.4"/>

    <!-- Cardinal directions background -->
    <circle cx="0" cy="0" r="35" fill="#1a1a2e" opacity="0.6"/>

    <!-- North arrow (red) -->
    <polygon points="0,-28 -8,-8 0,-12 8,-8" fill="#FF1744" opacity="0.95"/>

    <!-- South arrow (white) -->
    <polygon points="0,28 -6,12 0,16 6,12" fill="#fff" opacity="0.7"/>

    <!-- East arrow (blue) -->
    <polygon points="28,0 12,-6 16,0 12,6" fill="#0052FF" opacity="0.9"/>

    <!-- West arrow (light) -->
    <polygon points="-28,0 -12,-6 -16,0 -12,6" fill="#ddd" opacity="0.6"/>

    <!-- Center circle -->
    <circle cx="0" cy="0" r="6" fill="#FFD700" opacity="0.9"/>
    <circle cx="0" cy="0" r="4" fill="#1a1a2e"/>

    <!-- Decorative elements -->
    <circle cx="0" cy="0" r="42" fill="none" stroke="#FFD700" stroke-width="0.5" opacity="0.3" stroke-dasharray="2,4"/>
  </g>

  <!-- Gold tier indicator -->
  <circle cx="256" cy="480" r="18" fill="#FFD700" filter="url(#goldGlow3)"/>
  <text x="256" y="487" font-size="16" font-weight="bold" text-anchor="middle" fill="#000">G</text>

  <!-- Badge name -->
  <text x="256" y="425" font-size="18" font-weight="bold" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif">Base Explorer</text>

  <!-- Base Quest text -->
  <text x="256" y="510" font-size="11" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" letter-spacing="1">BASE QUEST</text>
</svg>